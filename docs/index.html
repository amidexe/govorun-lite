<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Говорун Lite</title>
<style>
  :root {
    --bg: #F5F5F7;
    --surface: #FFFFFF;
    --surface-hover: #ECECEF;
    --on-surface: #14141A;
    --on-surface-variant: #4A4A52;
    --primary: #14141A;
    --outline-variant: #C8C8CE;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--on-surface);
    line-height: 1.6;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 64px 24px;
  }
  h1 {
    font-size: 32px;
    font-weight: 700;
    margin: 16px 0 8px;
    letter-spacing: -0.5px;
  }
  .tagline {
    color: var(--on-surface-variant);
    font-size: 18px;
    margin: 0 0 32px;
  }
  .links { list-style: none; padding: 0; margin: 0; }
  .links li { margin: 12px 0; }
  .links a {
    display: block;
    background: var(--surface);
    padding: 16px 20px;
    border-radius: 16px;
    color: var(--primary);
    text-decoration: none;
    font-weight: 500;
  }
  .links a:hover { background: var(--surface-hover); }
  .links a.primary {
    background: var(--on-surface);
    color: var(--bg);
  }
  .links a.primary:hover { background: var(--on-surface-variant); }
  .banner { width: 100%; height: auto; border-radius: 16px; margin-bottom: 32px; }
</style>
</head>
<body>
<main class="container">
  <img class="banner" src="banner.svg" alt="Говорун Lite — голосовой ввод на русском без интернета">
  <h1>Говорун Lite</h1>
  <p class="tagline">Голосовой ввод на русском для Android. Работает прямо на телефоне — без интернета и без аккаунтов.</p>
  <ul class="links">
    <li><a class="primary" href="https://www.rustore.ru/catalog/app/com.govorun.lite">Скачать в RuStore</a></li>
    <li><a href="https://github.com/amidexe/govorun-lite">Исходный код на GitHub</a></li>
    <li><a href="privacy.html">Политика конфиденциальности</a></li>
  </ul>
</main>
</body>
</html>
